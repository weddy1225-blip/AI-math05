<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單位偵探：時空修復計畫</title>
    <style>
        :root {
            --primary: #FF6B6B; 
            --secondary: #4834D4; 
            --accent: #1DD1A1; 
            --bg: #F0F7FF;
            --success: #10AC84;
            --error: #EE5253;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 20px 0px #DDE4F0;
            width: 95%;
            max-width: 800px;
            text-align: center;
            border: 8px solid var(--secondary);
        }

        .screen { display: none; }
        .active { display: block; }

        h1 { color: var(--secondary); font-size: 2.8rem; margin-top: 0; }
        
        .intro-box {
            text-align: left;
            background: #FFF9E6;
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 30px;
            border: 4px dashed #FECA57;
        }
        .intro-box p { font-size: 1.3rem; line-height: 1.8; color: #444; }

        #quest-type { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        
        /* 核心填空區設計 */
        .ai-dialogue {
            background: #2F3640;
            color: #FFF;
            padding: 40px;
            border-radius: 30px;
            margin-bottom: 25px;
            font-size: 2rem;
            line-height: 1.8;
            border-bottom: 10px solid var(--accent);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        input[type="number"] {
            width: 180px;
            padding: 10px;
            border: 4px solid var(--accent);
            border-radius: 15px;
            font-size: 2rem;
            text-align: center;
            outline: none;
            background: white;
            color: var(--secondary);
            font-family: inherit;
        }

        /* 隱藏 Chrome/Safari 的數字箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .unit-label { font-size: 1.8rem; font-weight: bold; color: var(--secondary); margin-left: 10px; }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 15px 45px;
            border-radius: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0px #341f97;
        }
        button:hover { background: var(--primary); box-shadow: 0 6px 0px #c0392b; transform: translateY(-2px); }
        button:active { transform: translateY(4px); box-shadow: none; }

        .timer-bg { width: 100%; height: 20px; background: #EEE; border-radius: 20px; margin-bottom: 25px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #1DD1A1, #FECA57, #FF6B6B); transition: 0.3s linear; }

        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .result-table th { background: var(--secondary); color: white; padding: 12px; }
        .result-table td { padding: 12px; border: 1px solid #DDD; text-align: center; }
        .tag-correct { color: var(--success); font-weight: bold; }
        .tag-wrong { color: var(--error); font-weight: bold; }
        
        #feedback { font-size: 1.6rem; font-weight: bold; height: 40px; margin-top: 15px; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 入口畫面 -->
    <div id="intro-screen" class="screen active">
        <h1>🕵️ 單位偵探社</h1>
        <div class="intro-box">
            <p>🔧 <b>任務：</b> 機器人的記憶體被清空了，請幫他填入正確的數字！</p>
            <p>📝 <b>操作：</b> 在空格內輸入答案，按下 <b>Enter</b> 或 <b>送出</b>。</p>
            <p>⚡ <b>注意：</b> 每個關卡只有 30 秒思考時間！</p>
        </div>
        <button onclick="startGame()">接受任務 🚀</button>
    </div>

    <!-- 遊戲進行畫面 -->
    <div id="game-play" class="screen">
        <div class="timer-bg"><div id="timer-bar"></div></div>
        <div id="quest-type">載入中...</div>
        
        <div class="ai-dialogue">
            <span id="quest-prefix"></span>
            <input type="number" id="user-input" placeholder="?" onkeypress="if(event.key==='Enter')checkAnswer()">
            <span id="quest-suffix"></span>
        </div>
        
        <button onclick="checkAnswer()">確認送出</button>
        <div id="feedback"></div>
    </div>

    <!-- 結算畫面 -->
    <div id="end-screen" class="screen">
        <h1>🏆 偵探任務報告</h1>
        <div id="final-score" style="font-size: 2.2rem; color: var(--primary); margin-bottom: 20px; font-weight: bold;"></div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="result-table" id="result-list">
                <thead>
                    <tr>
                        <th>關卡類型</th>
                        <th>你的答案</th>
                        <th>正確答案</th>
                        <th>結果</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <br>
        <button onclick="location.reload()">再挑戰一次 🔄</button>
    </div>
</div>

<script>
    const fullBank = {
        stage1: [
            { type: "【大數密碼】", quest: "「五萬零七」寫成數字是 (　)", correct: "50007" },
            { type: "【大數密碼】", quest: "「三億零五萬」寫成數字是 (　)", correct: "300050000" },
            { type: "【大數密碼】", quest: "「七百萬零九十」寫成數字是 (　)", correct: "7000090" },
            { type: "【大數密碼】", quest: "十個十萬是 (　) 萬", correct: "100" },
            { type: "【大數密碼】", quest: "「二千零八萬」寫成數字是 (　)", correct: "20080000" },
            { type: "【大數密碼】", quest: "四兆是 (　) 個一億", correct: "40000" },
            { type: "【大數密碼】", quest: "「六十萬零八百」寫成數字是 (　)", correct: "600800" },
            { type: "【大數密碼】", quest: "十個一億是 (　) 億", correct: "10" },
            { type: "【大數密碼】", quest: "「九億零九」寫成數字是 (　)", correct: "900000009" },
            { type: "【大數密碼】", quest: "一千萬是 (　) 個十萬", correct: "100" }
        ],
        stage2: [
            { type: "【距離測量】", quest: "4 公里等於 (　) 公尺", correct: "4000" },
            { type: "【距離測量】", quest: "3000 公尺等於 (　) 公里", correct: "3" },
            { type: "【距離測量】", quest: "1 公里 50 公尺是 (　) 公尺", correct: "1050" },
            { type: "【距離測量】", quest: "20000 公尺等於 (　) 公里", correct: "20" },
            { type: "【距離測量】", quest: "8 公里 8 公尺是 (　) 公尺", correct: "8008" },
            { type: "【距離測量】", quest: "1500 公尺等於 (　) 公里 (　) 公尺", correct: "1.5", note: "此題建議拆分，暫設 1.5" },
            { type: "【距離測量】", quest: "42 公里等於 (　) 公尺", correct: "42000" },
            { type: "【距離測量】", quest: "10 公里等於 (　) 公尺", correct: "10000" },
            { type: "【距離測量】", quest: "2000 公尺等於 (　) 公里", correct: "2" },
            { type: "【距離測量】", quest: "5 公里 60 公尺是 (　) 公尺", correct: "5060" }
        ],
        stage3: [
            { type: "【重量挑戰】", quest: "2 公噸等於 (　) 公斤", correct: "2000" },
            { type: "【重量挑戰】", quest: "5000 公斤等於 (　) 公噸", correct: "5" },
            { type: "【重量挑戰】", quest: "3 公噸 40 公斤是 (　) 公斤", correct: "3040" },
            { type: "【重量挑戰】", quest: "10 公噸等於 (　) 公斤", correct: "10000" },
            { type: "【重量挑戰】", quest: "8000 公斤等於 (　) 公噸", correct: "8" },
            { type: "【重量挑戰】", quest: "15 公噸等於 (　) 公斤", correct: "15000" },
            { type: "【重量挑戰】", quest: "4005 公斤等於 (　) 公噸 (　) 公斤", correct: "4.005", note: "暫設小數" },
            { type: "【重量挑戰】", quest: "120 公噸等於 (　) 公斤", correct: "120000" },
            { type: "【重量挑戰】", quest: "7 公噸 700 公斤是 (　) 公斤", correct: "7700" },
            { type: "【重量挑戰】", quest: "2500 公斤等於 (　) 公噸", correct: "2.5" }
        ],
        stage4: [
            { type: "【面積計算】", quest: "邊長 10 公分正方形，面積是 (　) 平方公分", correct: "100" },
            { type: "【周長挑戰】", quest: "邊長 5 公分正方形，周長是 (　) 公分", correct: "20" },
            { type: "【面積計算】", quest: "長 5 公尺、寬 4 公尺，面積是 (　) 平方公尺", correct: "20" },
            { type: "【周長挑戰】", quest: "長 10 公分、寬 2 公分，周長是 (　) 公分", correct: "24" },
            { type: "【面積計算】", quest: "1 平方公尺等於 (　) 平方公分", correct: "10000" },
            { type: "【面積計算】", quest: "長 20 公分、寬 10 公分，面積是 (　) 平方公分", correct: "200" },
            { type: "【面積計算】", quest: "10000 平方公分等於 (　) 平方公尺", correct: "1" },
            { type: "【面積計算】", quest: "長方形面積 50，長是 10，寬是 (　) 公分", correct: "5" },
            { type: "【面積計算】", quest: "正方形面積 64，邊長是 (　) 公分", correct: "8" },
            { type: "【周長挑戰】", quest: "長方形長 8、寬 2，周長是 (　) 公分", correct: "20" }
        ],
        stage5: [
            { type: "【時間換算】", quest: "3 小時等於 (　) 分鐘", correct: "180" },
            { type: "【時間換算】", quest: "2 分鐘 15 秒等於 (　) 秒", correct: "135" },
            { type: "【時間換算】", quest: "180 分鐘等於 (　) 小時", correct: "3" },
            { type: "【時間換算】", quest: "從早上 9 點到下午 2 點經過 (　) 小時", correct: "5" },
            { type: "【時間換算】", quest: "一整天 24 小時等於 (　) 分鐘", correct: "1440" },
            { type: "【時間換算】", quest: "360 秒等於 (　) 分鐘", correct: "6" },
            { type: "【時間換算】", quest: "1 小時 20 分鐘等於 (　) 分鐘", correct: "80" },
            { type: "【時間換算】", quest: "下午 4 點是 24 小時制的 (　) 點", correct: "16" },
            { type: "【時間換算】", quest: "200 分鐘是 (　) 小時又 20 分", correct: "3" },
            { type: "【時間換算】", quest: "5 分鐘等於 (　) 秒", correct: "300" }
        ]
    };

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let history = [];
    let timeLeft = 100;
    let timer;

    function startGame() {
        // 從各階段隨機抽 1 題，組成 5 題任務
        gameQuestions = [
            fullBank.stage1[Math.floor(Math.random() * 10)],
            fullBank.stage2[Math.floor(Math.random() * 10)],
            fullBank.stage3[Math.floor(Math.random() * 10)],
            fullBank.stage4[Math.floor(Math.random() * 10)],
            fullBank.stage5[Math.floor(Math.random() * 10)]
        ];
        
        showScreen('game-play');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= gameQuestions.length) {
            showEndScreen();
            return;
        }

        const q = gameQuestions[currentIdx];
        document.getElementById('quest-type').innerText = q.type;
        
        // 挖空邏輯：將題目以 (　) 拆分
        const parts = q.quest.split("(　)");
        document.getElementById('quest-prefix').innerText = `🤖 ${parts[0]}`;
        document.getElementById('quest-suffix').innerText = parts[1] || "";
        
        const input = document.getElementById('user-input');
        input.value = "";
        input.focus(); // 自動聚焦，方便直接輸入
        document.getElementById('feedback').innerText = "";
        
        timeLeft = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft -= 1;
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if (timeLeft <= 0) checkAnswer(true);
        }, 300); // 30秒限時
    }

    function checkAnswer(timeout = false) {
        if (document.getElementById('game-play').style.display === 'none') return;
        
        clearInterval(timer);
        const q = gameQuestions[currentIdx];
        const val = document.getElementById('user-input').value.trim();
        
        // 數值比對 (容許字串與數字比對)
        const isRight = (val !== "" && parseFloat(val) === parseFloat(q.correct));
        
        if (isRight) score++;

        history.push({
            type: q.type,
            user: val || "未填寫",
            correct: q.correct,
            status: isRight ? "✅ 正確" : (timeout ? "⏰ 逾時" : "❌ 錯誤")
        });

        const feedback = document.getElementById('feedback');
        feedback.innerHTML = isRight ? 
            `<span style="color:var(--success)">🎉 太棒了！修復成功</span>` : 
            `<span style="color:var(--error)">⚡ 能源不穩！正確是 ${q.correct}</span>`;

        // 鎖定輸入避免重複送出
        document.getElementById('user-input').blur();
        
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 1500);
    }

    function showEndScreen() {
        showScreen('end-screen');
        const finalPercent = (score / gameQuestions.length) * 100;
        document.getElementById('final-score').innerText = `任務完成度：${finalPercent} %`;
        
        let html = "";
        history.forEach(h => {
            html += `<tr>
                <td>${h.type}</td>
                <td style="font-weight:bold">${h.user}</td>
                <td style="color:var(--secondary); font-weight:bold">${h.correct}</td>
                <td class="${h.status === '✅ 正確' ? 'tag-correct' : 'tag-wrong'}">${h.status}</td>
            </tr>`;
        });
        document.querySelector('#result-list tbody').innerHTML = html;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
