<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>混亂的單位：AI 偵探社</title>
    <style>
        :root {
            --primary: #FF6B6B; 
            --secondary: #4834D4; 
            --accent: #1DD1A1; 
            --warning: #FECA57; 
            --bg: #F0F7FF;
            --success: #10AC84;
            --error: #EE5253;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            background: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 20px 0px #DDE4F0;
            width: 95%;
            max-width: 750px;
            text-align: center;
            border: 8px solid var(--secondary);
        }

        .screen { display: none; }
        .active { display: block; }

        h1 { color: var(--secondary); font-size: 3rem; margin-top: 0; text-shadow: 3px 3px 0px #E0E0E0; }
        
        .intro-box {
            text-align: left;
            background: #FFF9E6;
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 30px;
            border: 4px dashed var(--warning);
        }
        .intro-box p { font-size: 1.4rem; line-height: 1.8; margin: 10px 0; color: #444; }

        #quest-type { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .ai-dialogue {
            background: #2F3640;
            color: #FFF;
            padding: 35px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-size: 1.8rem;
            line-height: 1.6;
            border-bottom: 10px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 250px;
            padding: 20px;
            border: 4px solid var(--secondary);
            border-radius: 20px;
            font-size: 2rem;
            text-align: center;
            outline: none;
            background: #F9F9F9;
        }

        .unit-label { font-size: 1.8rem; font-weight: bold; color: var(--secondary); min-width: 80px; text-align: left; }

        button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0px #341f97;
        }
        button:hover { background: var(--primary); box-shadow: 0 6px 0px #c0392b; transform: translateY(-2px); }
        button:active { transform: translateY(4px); box-shadow: none; }

        .timer-bg { width: 100%; height: 25px; background: #EEE; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 3px solid #DDD; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #1DD1A1, #FECA57, #FF6B6B); transition: 0.3s linear; }

        .result-table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 1.1rem; }
        .result-table th { background: var(--secondary); color: white; padding: 12px; border: 1px solid #DDD; }
        .result-table td { padding: 12px; border: 1px solid #DDD; text-align: center; }
        .tag-correct { color: var(--success); font-weight: bold; }
        .tag-wrong { color: var(--error); font-weight: bold; }
        
        #feedback { font-size: 1.6rem; font-weight: bold; margin-top: 10px; height: 40px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="intro-screen" class="screen active">
        <h1>🕵️ 混亂的單位</h1>
        <div class="intro-box">
            <p>1. 🔍 <b>找錯誤：</b> 機器人的單位換算壞掉了，數字都亂跳！</p>
            <p>2. ✍️ <b>填正確：</b> 找出錯誤，填入<b>「正確的數字」</b>。</p>
            <p>3. ⏱️ <b>救時空：</b> 每次題目都不一樣！按下 <b>Enter</b> 也能送出！</p>
        </div>
        <button onclick="startGame()">開始隨機任務 🚀</button>
    </div>

    <div id="game-play" class="screen">
        <div class="timer-bg"><div id="timer-bar"></div></div>
        <div id="quest-type">載入中...</div>
        <div class="ai-dialogue" id="ai-quest">載入題庫中...</div>
        
        <div class="action-area">
            <input type="text" id="user-input" autocomplete="off" placeholder="填數字" onkeypress="if(event.key==='Enter')checkAnswer()">
            <span class="unit-label" id="unit-tag">單位</span>
            <button onclick="checkAnswer()">送出</button>
        </div>
        
        <div id="feedback"></div>
    </div>

    <div id="end-screen" class="screen">
        <h1>🏆 偵探任務報告</h1>
        <div id="final-score" style="font-size: 2rem; color: var(--primary); margin-bottom: 20px;"></div>
        <div style="max-height: 400px; overflow-y: auto;">
            <table class="result-table" id="result-list">
                <thead>
                    <tr>
                        <th>關卡類型</th>
                        <th>原本的錯</th>
                        <th>你的答案</th>
                        <th>正確數字</th>
                        <th>結果</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <br>
        <button onclick="location.reload()">更換題目再玩一次 🔄</button>
    </div>
</div>

<script>
    // 擴充題庫：5個階段，各10題
    const fullBank = {
        stage1: [ // 大數密碼
            { type: "【大數密碼】", quest: "密碼是「五萬零七」，數字應該是 500070！", wrongNum: "500070", correct: "50007", unit: "數字" },
            { type: "【大數密碼】", quest: "「三億零五萬」，寫成數字是 300500000！", wrongNum: "300500000", correct: "300050000", unit: "數字" },
            { type: "【大數密碼】", quest: "「七百萬零九十」，數字寫作 7009000！", wrongNum: "7009000", correct: "7000090", unit: "數字" },
            { type: "【大數密碼】", quest: "十個一萬是十萬，那十個十萬是一千萬！", wrongNum: "一千萬", correct: "1000000", unit: "數字" },
            { type: "【大數密碼】", quest: "「二千零八萬」，寫成數字是 208000000！", wrongNum: "208000000", correct: "20080000", unit: "數字" },
            { type: "【大數密碼】", quest: "數字 13000500 是「一千三百萬零五百」！", wrongNum: "一千三百萬零五百", correct: "13000500", unit: "數字" },
            { type: "【大數密碼】", quest: "四兆是幾個億？我看是 40 個億吧！", wrongNum: "40", correct: "40000", unit: "個億" },
            { type: "【大數密碼】", quest: "「六十萬零八百」，寫成數字是 600000800！", wrongNum: "600000800", correct: "600800", unit: "數字" },
            { type: "【大數密碼】", quest: "一個一億是十個一千萬，那十個一億是十兆！", wrongNum: "十兆", correct: "1000000000", unit: "數字" },
            { type: "【大數密碼】", quest: "密碼是「九億零九」，數字寫成 9000000090！", wrongNum: "9000000090", correct: "900000009", unit: "數字" }
        ],
        stage2: [ // 距離換算 (公里/公尺)
            { type: "【距離測量】", quest: "跑 4 公里就是跑 400 公尺，快跑完啦！", wrongNum: "400", correct: "4000", unit: "公尺" },
            { type: "【距離測量】", quest: "這座山高 3000 公尺，也就是 300 公里高！", wrongNum: "300", correct: "3", unit: "公里" },
            { type: "【距離測量】", quest: "隧道長 1 公里 50 公尺，換算後是 1500 公尺！", wrongNum: "1500", correct: "1050", unit: "公尺" },
            { type: "【距離測量】", quest: "我看這地圖標示 20000 公尺，其實才 2 公里！", wrongNum: "2", correct: "20", unit: "公里" },
            { type: "【距離測量】", quest: "8 公里 8 公尺，數字換算後是 8008 公尺！", wrongNum: "8008", correct: "8008", correct: "8008", unit: "公尺" }, // 陷阱：本身正確? 不，我們改錯
            { type: "【距離測量】", quest: "8 公里 8 公尺，數字換算後是 8800 公尺！", wrongNum: "8800", correct: "8008", unit: "公尺" },
            { type: "【距離測量】", quest: "學校到家裡 1500 公尺，也就是 15 公里！", wrongNum: "15", correct: "1.5", unit: "公里" },
            { type: "【距離測量】", quest: "馬拉松 42 公里，換算成公尺是 4200 公尺！", wrongNum: "4200", correct: "42000", unit: "公尺" },
            { type: "【距離測量】", quest: "飛機高度 10 公里，也就是 1000 公尺！", wrongNum: "1000", correct: "10000", unit: "公尺" },
            { type: "【距離測量】", quest: "捷運軌道長 2000 公尺，也就是 20 公里！", wrongNum: "20", correct: "2", unit: "公里" },
            { type: "【距離測量】", quest: "5 公里 60 公尺，寫成公尺是 560 公尺！", wrongNum: "560", correct: "5060", unit: "公尺" }
        ],
        stage3: [ // 重量換算 (公噸/公斤)
            { type: "【重量挑戰】", quest: "我有 2 公噸的電池，也就是 200 公斤！", wrongNum: "200", correct: "2000", unit: "公斤" },
            { type: "【重量挑戰】", quest: "大象重 5000 公斤，換算成公噸是 50 公噸！", wrongNum: "50", correct: "5", unit: "公噸" },
            { type: "【重量挑戰】", quest: "3 公噸 40 公斤的貨物，總共是 3400 公斤！", wrongNum: "3400", correct: "3040", unit: "公斤" },
            { type: "【重量挑戰】", quest: "卡車限重 10 公噸，等於只能載 1000 公斤！", wrongNum: "1000", correct: "10000", unit: "公斤" },
            { type: "【重量挑戰】", quest: "8000 公斤的鋼鐵，換算後只有 0.8 公噸！", wrongNum: "0.8", correct: "8", unit: "公噸" },
            { type: "【重量挑戰】", quest: "15 公噸等於多少公斤？應該是 1500 公斤！", wrongNum: "1500", correct: "15000", unit: "公斤" },
            { type: "【重量挑戰】", quest: "4005 公斤換算成公噸是 40 公噸 5 公斤！", wrongNum: "40", correct: "4", unit: "公噸" },
            { type: "【重量挑戰】", quest: "鯨魚重 120 公噸，也就是 12000 公斤！", wrongNum: "12000", correct: "120000", unit: "公斤" },
            { type: "【重量挑戰】", quest: "7 公噸 700 公斤，寫成公斤是 7070 公斤！", wrongNum: "7070", correct: "7700", unit: "公斤" },
            { type: "【重量挑戰】", quest: "2500 公斤的砂糖，換算後是 25 公噸！", wrongNum: "25", correct: "2.5", unit: "公噸" }
        ],
        stage4: [ // 周長與面積 (平方公分/公尺)
            { type: "【面積計算】", quest: "邊長 10 公分正方形，面積是 40 平方公分！", wrongNum: "40", correct: "100", unit: "平方公分" },
            { type: "【周長挑戰】", quest: "邊長 5 公分正方形，周長是 25 公分！", wrongNum: "25", correct: "20", unit: "公分" },
            { type: "【面積計算】", quest: "長 5 公尺、寬 4 公尺長方形，面積是 9 平方公尺！", wrongNum: "9", correct: "20", unit: "平方公尺" },
            { type: "【周長挑戰】", quest: "長 10 公分、寬 2 公分長方形，周長是 12 公分！", wrongNum: "12", correct: "24", unit: "公分" },
            { type: "【面積計算】", quest: "一個 1 平方公尺的墊子，是 100 平方公分！", wrongNum: "100", correct: "10000", unit: "平方公分" },
            { type: "【周長挑戰】", quest: "每邊長 8 公尺的操場周長，應該是 16 公尺！", wrongNum: "16", correct: "32", unit: "公尺" },
            { type: "【面積計算】", quest: "長 20 公分、寬 10 公分，面積是 30 平方公分！", wrongNum: "30", correct: "200", unit: "平方公分" },
            { type: "【面積計算】", quest: "10000 平方公分也就是 100 平方公尺！", wrongNum: "100", correct: "1", unit: "平方公尺" },
            { type: "【面積計算】", quest: "長方形面積 50，長是 10，寬應該是 40！", wrongNum: "40", correct: "5", unit: "公分" },
            { type: "【面積計算】", quest: "正方形面積 64 平方公分，邊長是 32 公分！", wrongNum: "32", correct: "8", unit: "公分" }
        ],
        stage5: [ // 時間換算 (時/分/秒)
            { type: "【時間換算】", quest: "3 小時等於多少分鐘？我覺得是 300 分鐘！", wrongNum: "300", correct: "180", unit: "分鐘" },
            { type: "【時間換算】", quest: "2 分鐘 15 秒，總共是 215 秒！", wrongNum: "215", correct: "135", unit: "秒" },
            { type: "【時間換算】", quest: "180 分鐘也就是 1.8 小時對吧！", wrongNum: "1.8", correct: "3", unit: "小時" },
            { type: "【時間換算】", quest: "從早上 9 點到下午 2 點，經過了 7 小時！", wrongNum: "7", correct: "5", unit: "小時" },
            { type: "【時間換算】", quest: "一整天 24 小時，換算成分鐘是 240 分鐘！", wrongNum: "240", correct: "1440", unit: "分鐘" },
            { type: "【時間換算】", quest: "360 秒換算成分鐘，應該是 3.6 分鐘！", wrongNum: "3.6", correct: "6", unit: "分鐘" },
            { type: "【時間換算】", quest: "1 小時 20 分鐘，等於 120 分鐘！", wrongNum: "120", correct: "80", unit: "分鐘" },
            { type: "【時間換算】", quest: "下午 4 點用 24 小時制看是 14 點！", wrongNum: "14", correct: "16", unit: "時" },
            { type: "【時間換算】", quest: "200 分鐘是 2 小時 0 分鐘！", wrongNum: "2", correct: "3", unit: "小時" },
            { type: "【時間換算】", quest: "5 分鐘等於 500 秒，這一定沒錯！", wrongNum: "500", correct: "300", unit: "秒" }
        ]
    };

    let gameQuestions = [];
    let currentIdx = 0;
    let score = 0;
    let history = [];
    let timeLeft = 100;
    let timer;

    function startGame() {
        // 從每一階段隨機抽一題
        gameQuestions = [
            fullBank.stage1[Math.floor(Math.random() * 10)],
            fullBank.stage2[Math.floor(Math.random() * 10)],
            fullBank.stage3[Math.floor(Math.random() * 10)],
            fullBank.stage4[Math.floor(Math.random() * 10)],
            fullBank.stage5[Math.floor(Math.random() * 10)]
        ];
        
        showScreen('game-play');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= gameQuestions.length) {
            showEndScreen();
            return;
        }

        const q = gameQuestions[currentIdx];
        document.getElementById('quest-type').innerText = q.type;
        document.getElementById('ai-quest').innerText = `🤖 ${q.quest}`;
        document.getElementById('unit-tag').innerText = q.unit;
        
        const input = document.getElementById('user-input');
        input.value = "";
        input.focus();
        document.getElementById('feedback').innerText = "";
        
        timeLeft = 100;
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft -= 1;
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if (timeLeft <= 0) checkAnswer(true);
        }, 300); // 30秒
    }

    function checkAnswer(timeout = false) {
        if (document.getElementById('game-play').style.display === 'none') return;
        
        clearInterval(timer);
        const q = gameQuestions[currentIdx];
        const val = document.getElementById('user-input').value.trim();
        const isRight = (val === q.correct);
        
        if (isRight) score++;

        history.push({
            type: q.type,
            wrong: q.wrongNum,
            user: val || "沒填寫",
            correct: q.correct,
            status: isRight ? "✅ 正確" : (timeout ? "⏰ 逾時" : "❌ 錯誤")
        });

        const feedback = document.getElementById('feedback');
        feedback.innerHTML = isRight ? 
            `<span style="color:var(--success)">🎉 修復成功！</span>` : 
            `<span style="color:var(--error)">⚡ 錯誤！正確是 ${q.correct}</span>`;

        document.getElementById('user-input').blur();
        setTimeout(() => {
            currentIdx++;
            loadQuestion();
        }, 2000);
    }

    function showEndScreen() {
        showScreen('end-screen');
        document.getElementById('final-score').innerText = `修復評分：${(score/gameQuestions.length)*100} 分`;
        
        let html = "";
        history.forEach(h => {
            html += `<tr>
                <td>${h.type}</td>
                <td style="text-decoration:line-through; color:#999">${h.wrong}</td>
                <td style="font-weight:bold">${h.user}</td>
                <td style="color:var(--secondary); font-weight:bold">${h.correct}</td>
                <td class="${h.status === '✅ 正確' ? 'tag-correct' : 'tag-wrong'}">${h.status}</td>
            </tr>`;
        });
        document.querySelector('#result-list tbody').innerHTML = html;
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
